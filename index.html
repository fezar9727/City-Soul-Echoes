<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Soul Echoes | Arte, Cultura Underground y Bienestar en Cali</title>
    
    <!-- ==== Bootstrap 5 ==== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<body>
    <!-- ==== Navbar – The Skyline ==== -->

            <a class="navbar-brand fw-bold fs-4 cyber-title" href="#">CITY SOUL ECHOES</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="#inicio"><i class="bi bi-house-door-fill me-1"></i>Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#vault"><i class="bi bi-safe2-fill me-1"></i>The Vault</a></li>
                    <li class="nav-item"><a class="nav-link" href="#artistas"><i class="bi bi-palette-fill me-1"></i>Artistas</a></li>

                    <li class="nav-item"><a class="nav-link" href="#aprendizaje"><i class="bi bi-book-fill me-1"></i>Aprendizaje</a></li>
                    <li class="nav-item"><a class="nav-link" href="#noticias"><i class="bi bi-newspaper me-1"></i>Noticias</a></li>

    <header id="inicio" class="hero-section d-flex align-items-center justify-content-center text-center">

            <source src="video/psicodelico-abstracto.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>
        
        <div class="container hero-content position-relative z-3">
            <h1 class="display-1 fw-bold mb-3 cyber-title">CITY SOUL ECHOES</h1>
            <p class="lead fs-3 mb-4">"El pulso artístico vive aquí"</p>
            <a href="#vault" class="btn btn-explore">EXPLORAR</a>
            
            <div class="mt-5">
                <i class="bi bi-chevron-down fs-1 text-white opacity-75"></i>
            </div>
        </div>

        <audio id="ambient-audio" loop>
            <source src="audio/air-on-the-g-string-usaf-band.mp3" type="audio/mpeg">
        </audio>
